name: CI

on:
  push:
    branches: ['**']

jobs:
  lint:
    if: "!startsWith(github.event.head_commit.message, 'Bump version')"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - run: uv sync --dev

      - name: Ruff check
        run: uv run ruff check improve/ tests/

      - name: Ruff format
        run: uv run ruff format --check improve/ tests/

  test:
    if: "!startsWith(github.event.head_commit.message, 'Bump version')"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - run: uv sync --dev

      - name: Run tests with coverage
        run: uv run pytest -v --tb=short --junitxml=report.xml --cov=improve --cov-report=xml --cov-report=term-missing

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: coverage.xml

  mutation:
    if: "!startsWith(github.event.head_commit.message, 'Bump version')"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - run: uv sync --dev

      - name: Run mutation testing (randomized, 6.5min max)
        run: |
          uv run python3 - <<'PY'
          import pathlib, random, re
          excluded = {"__init__.py", "version.py", "color.py"}
          files = sorted(str(p) for p in pathlib.Path("improve").glob("*.py") if p.name not in excluded)
          random.shuffle(files)
          print("Mutation order:", files)
          pyproject = pathlib.Path("pyproject.toml")
          new_paths = "[" + ", ".join(f'"{f}"' for f in files) + "]"
          pyproject.write_text(
              re.sub(
                  r"^paths_to_mutate = \[.*\]$",
                  f"paths_to_mutate = {new_paths}",
                  pyproject.read_text(),
                  count=1,
                  flags=re.MULTILINE,
              )
          )
          PY
          timeout 390 uv run mutmut run || rc=$?
          rc=${rc:-0}
          case "$rc" in
            0|2|4|6|8|10|12|14|124) ;;
            *) exit "$rc" ;;
          esac
          uv run mutmut export-cicd-stats || true
          uv run python3 -c "
          import json, os, sys
          path = 'mutants/mutmut-cicd-stats.json'
          if not os.path.exists(path):
              print('No mutation stats generated — passing')
              sys.exit(0)
          with open(path) as f:
              stats = json.load(f)
          killed = stats.get('killed', 0)
          survived = stats.get('survived', 0)
          timeout = stats.get('timeout', 0)
          total = killed + survived + timeout
          if total < 30:
              print(f'Only {total} mutants tested — too few for reliable rate, passing')
              sys.exit(0)
          rate = killed * 100 / total
          print(f'Mutation kill rate: {rate:.1f}% ({killed}/{total} tested)')
          if rate < 55:
              print(f'FAIL: {rate:.1f}% is below 55% threshold')
              sys.exit(1)
          "
