name: Mutation (nightly)

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  mutation-full:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - run: uv sync --dev

      - name: Run full mutation testing (3h max)
        run: |
          timeout 10800 uv run mutmut run || rc=$?
          rc=${rc:-0}
          case "$rc" in
            0|2|4|6|8|10|12|14|124) ;;
            *) exit "$rc" ;;
          esac
          uv run mutmut export-cicd-stats || true
          uv run python3 -c "
          import json, os, sys
          path = 'mutants/mutmut-cicd-stats.json'
          if not os.path.exists(path):
              print('No mutation stats generated — passing')
              sys.exit(0)
          with open(path) as f:
              stats = json.load(f)
          killed = stats.get('killed', 0)
          survived = stats.get('survived', 0)
          timeout = stats.get('timeout', 0)
          total = killed + survived + timeout
          if total < 30:
              print(f'Only {total} mutants tested — too few for reliable rate, passing')
              sys.exit(0)
          rate = killed * 100 / total
          print(f'Mutation kill rate: {rate:.1f}% ({killed}/{total} tested)')
          if rate < 60:
              print(f'FAIL: {rate:.1f}% is below 60% threshold')
              sys.exit(1)
          "
