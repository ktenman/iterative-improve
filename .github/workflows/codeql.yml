name: CodeQL

on:
  push:
    branches: [main]
    paths-ignore:
      - pyproject.toml
  pull_request:
    branches: [main]
    paths-ignore:
      - pyproject.toml

jobs:
  analyze:
    runs-on: ubuntu-latest
    permissions:
      security-events: write
    steps:
      - uses: actions/checkout@v6

      - uses: github/codeql-action/init@v4
        with:
          languages: python

      - uses: github/codeql-action/analyze@v4
